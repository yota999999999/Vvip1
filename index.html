<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Kartu</title>

<style>
html,body{
background:transparent;
height:100vh;
margin:0;
font-family:sans-serif;
overflow:hidden;
}

#bgVideo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90vw;
max-width:1000px;
aspect-ratio:16/9;
object-fit:contain;
z-index:-1;
filter:brightness(0.5);
}

.container{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-55%);
display:grid;
grid-template-columns:repeat(4,80px);
gap:20px;
z-index:10;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
z-index:20;
}

/* KARTU BULAT TRANSPARAN */
.kartu{
width:80px;
height:80px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
cursor:pointer;
overflow:hidden;
position:relative;
transition:0.3s;
background:transparent;
border:2px solid rgba(255,255,255,0.5);
backdrop-filter:blur(2px);
}

.kartu:hover{
transform:scale(1.1);
}

.reguler .kartu{
box-shadow:0 0 10px #00ff00,0 0 20px #00ff00;
}

.vip .kartu{
box-shadow:0 0 10px red,0 0 20px red;
}

@keyframes jatuh{
0%{transform:translateY(-300px);opacity:0;}
100%{transform:translateY(0);opacity:1;}
}

.jatuh{
animation:jatuh 0.6s cubic-bezier(.2,1.5,.5,1) forwards;
}

@keyframes hilang{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(100px);opacity:0;}
}

.hilang{
animation:hilang 0.5s ease forwards;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-4px,3px);}
50%{transform:translate(4px,-3px);}
75%{transform:translate(-4px,3px);}
100%{transform:translate(0,0);}
}

.shake{
animation:shake 0.1s infinite;
}

.kartu img{
width:90%;
height:90%;
object-fit:contain;
display:none;
}

.nomor{
position:absolute;
font-size:26px;
font-weight:bold;
color:white;
text-shadow:0 0 10px black;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
}

#tongkat{
position:fixed;
width:100px;
height:100px;
top:80%;
left:50%;
transform:translate(-50%,-50%);
z-index:999;
cursor:grab;
}
</style>
</head>

<body class="reguler">

<video autoplay muted loop id="bgVideo">
<source src="hd.mp4" type="video/mp4">
</video>

<div class="container" id="container"></div>

<img src="tongkat.png" id="tongkat">

<div class="controls">
<button onclick="resetGame()">Reset</button>
<button onclick="bukaSemua()">Buka Semua</button>
<button onclick="togglePower()" id="powerBtn">POWER ON</button>
<button onclick="setMode('vip')">VIP MODE</button>
<button onclick="setMode('reguler')">REGULER</button>
</div>

<script>

const container=document.getElementById("container")

const soundJP=new Audio("jp.mp3")
const soundMitos=new Audio("mitos1.mp3")

let powerOn=true
let mode="reguler"

const huruf=["A","B","C","D","E","F","G","H","I","J","K","L"]

let hadiahReguler=[
"megalodon.png","kraken.png","3tb.png","love.png",
"el_maja.png","worm.png","kinkjeli.png","elpirate.png",
"bone.png","grate.png","kink.png","el_retro.png"
]

let hadiahVIP=[
"cursed.png","loknes.png","retro.png","lele.png",
"cupid.png","1x1.png","magma.png","pelangi.png",
"5tb.png","10tb.png","elpirate.png","megajeruk.png"
]

let kartuData=[]
let klik=0

function setMode(m){

if(!powerOn)return

mode=m

document.body.classList.remove("vip","reguler")
document.body.classList.add(m)

resetGame()

}

function togglePower(){

powerOn=!powerOn

let btn=document.getElementById("powerBtn")

if(powerOn){

btn.innerText="POWER ON"
init()

}else{

btn.innerText="POWER OFF"

document.querySelectorAll(".kartu").forEach((k,i)=>{

setTimeout(()=>{
k.classList.remove("jatuh")
k.classList.add("hilang")
},i*50)

})

soundJP.pause()
soundMitos.pause()

}

}

function init(){

container.innerHTML=""
klik=0

let hadiahList=(mode==="vip")?hadiahVIP:hadiahReguler

kartuData=[...hadiahList].sort(()=>Math.random()-0.5)

for(let i=0;i<12;i++){

let div=document.createElement("div")
div.className="kartu"
div.dataset.index=i

let img=document.createElement("img")
img.src="o.png"

let nomor=document.createElement("div")
nomor.className="nomor"
nomor.innerText=huruf[i]

div.appendChild(img)
div.appendChild(nomor)

div.onclick=()=>bukaKartu(div)

container.appendChild(div)

setTimeout(()=>{
div.classList.add("jatuh")
},i*80)

}

}

function bukaKartu(div){

if(!powerOn)return

let i=div.dataset.index
let img=div.querySelector("img")
let nomor=div.querySelector(".nomor")

if(!img.src.includes("o.png"))return

klik++

let hadiah=kartuData[i]

if(mode==="vip" && klik===1 && (hadiah==="cupid.png"||hadiah==="lele.png")){

let indexLain

do{
indexLain=Math.floor(Math.random()*kartuData.length)
}while((kartuData[indexLain]==="cupid.png"||kartuData[indexLain]==="lele.png")||indexLain==i)

[kartuData[i],kartuData[indexLain]]=[kartuData[indexLain],kartuData[i]]

hadiah=kartuData[i]

}

if(mode==="reguler" && klik===1 && hadiah==="love.png"){

let indexLain

do{
indexLain=Math.floor(Math.random()*kartuData.length)
}while(kartuData[indexLain]==="love.png"||indexLain==i)

[kartuData[i],kartuData[indexLain]]=[kartuData[indexLain],kartuData[i]]

hadiah=kartuData[i]

}

div.classList.add("shake")

setTimeout(()=>{

div.classList.remove("shake")

img.style.display="block"
img.src=hadiah
nomor.style.display="none"

if(
(mode==="vip"&&(hadiah==="cupid.png"||hadiah==="lele.png"))||
(mode==="reguler"&&hadiah==="love.png")
){

soundJP.currentTime=0
soundJP.play()

}else{

soundMitos.currentTime=0
soundMitos.play()

}

},300)

}

function bukaSemua(){

if(!powerOn)return

document.querySelectorAll(".kartu").forEach((kartu,i)=>{

setTimeout(()=>{

let img=kartu.querySelector("img")
let nomor=kartu.querySelector(".nomor")

if(img.src.includes("o.png")){

img.style.display="block"
img.src=kartuData[i]
nomor.style.display="none"

}

},i*80)

})

}

function resetGame(){

if(!powerOn)return

document.querySelectorAll(".kartu").forEach((k,i)=>{

setTimeout(()=>{
k.classList.remove("jatuh")
k.classList.add("hilang")
},i*50)

})

setTimeout(()=>{
init()
},400)

}

const tongkat=document.getElementById("tongkat")

let isDrag=false

tongkat.addEventListener("mousedown",()=>isDrag=true)
document.addEventListener("mouseup",()=>isDrag=false)

document.addEventListener("mousemove",e=>{
if(!isDrag)return
tongkat.style.left=e.clientX+"px"
tongkat.style.top=e.clientY+"px"
})

tongkat.addEventListener("touchstart",()=>isDrag=true)
document.addEventListener("touchend",()=>isDrag=false)

document.addEventListener("touchmove",e=>{
if(!isDrag)return
let t=e.touches[0]
tongkat.style.left=t.clientX+"px"
tongkat.style.top=t.clientY+"px"
})

init()

</script>

</body>
</html>
